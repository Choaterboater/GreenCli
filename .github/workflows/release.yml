name: Release

# Builds signed-able installers for macOS (.dmg/.app) and Windows (.msi/.exe NSIS)
# and uploads them to a draft GitHub Release. Triggered by pushing a v* tag, or
# manually via the Actions tab.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# The default GITHUB_TOKEN is read-only in this repo; tauri-action needs to
# create the draft release and upload installer assets.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon + Intel macOS
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          # Windows x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci

      # Tauri v1's bundler hides notarytool's real stderr behind a generic
      # "failed to upload app to Apple's notarization servers." — validate the
      # Apple ID / app-specific password / Team ID triple up front so the
      # actual Apple error (e.g. HTTP 401) shows in the log. Values are passed
      # via env and never echoed; only their lengths are printed (an
      # app-specific password is exactly 19 chars: xxxx-xxxx-xxxx-xxxx).
      - name: Preflight - validate Apple notarization credentials
        if: runner.os == 'macOS'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          : "${APPLE_ID:?APPLE_ID secret is empty or unset}"
          : "${APPLE_PASSWORD:?APPLE_PASSWORD secret is empty or unset}"
          : "${APPLE_TEAM_ID:?APPLE_TEAM_ID secret is empty or unset}"
          echo "APPLE_ID length: ${#APPLE_ID}; APPLE_PASSWORD length: ${#APPLE_PASSWORD} (expect 19); APPLE_TEAM_ID length: ${#APPLE_TEAM_ID} (expect 10)"
          # Real auth round-trip with Apple; prints Apple's native error on failure.
          xcrun notarytool history \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID"
          echo "Notarization credentials validated successfully."

      - name: Build + bundle (tauri-action)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing + notarization
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows code signing:
          # WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          # WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          # The Tauri app lives at the repo root (this `project/` folder).
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || format('v0.0.0-{0}', github.run_number) }}
          releaseName: "GreenCli ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
